<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог автомобилей</title>

<body>
    <div class="swiper">
  <div class="swiper-wrapper">
    <!-- Каждая картинка оборачивается в swiper-slide -->
    <div class="swiper-slide"><img src="images/car1.jpg" alt="Фото 1"></div>
    <div class="swiper-slide"><img src="images/car2.jpg" alt="Фото 2"></div>
    <div class="swiper-slide"><img src="images/car3.jpg" alt="Фото 3"></div>
  </div>
  <!-- Элементы управления (по желанию) -->
  <div class="swiper-pagination"></div>
  <div class="swiper-button-prev"></div>
  <div class="swiper-button-next"></div>
</div>
    <div class="taplink-container">
        <!-- Шапка профиля -->
        <header class="profile">
            <img src="images/avatar.jpg" alt="Логотип" class="avatar">
            <h1>PDmotors</h1>

        <!-- Блок связи и соцсетей -->
        <div class="social-actions">
            <a href="tel:+79852892812" class="action-btn call-btn">📞 Позвонить</a>
            <a href="https://t.me/Ismail_0895" class="action-btn tg-btn">💬 Telegram</a>
            <a href="https://wa.me/79852892812" class="action-btn wa-btn">🟢 WhatsApp</a>
        </div>

        <main class="products-grid">
            
            <div class="product-card">
                <img src="images/product1.jpg" alt="Авто 1" class="product-img">
                <div class="product-info">
                    <h3 class="product-name">Lada (ВАЗ) Vesta I, 2018</h3>

            </div>
            <div class="product-card">
                <img src="images/product2.jpg" alt="Авто 2" class="product-img">
                <div class="product-info">
                    <h3 class="product-name">Hyundai Solaris I Рестайлинг, 2016</h3>
                    <p class="product-price">900.000 ₽</p>
                    <a href="https://t.me?text=Хочу_купить_Автомобиль" class="buy-btn">Заказать</a>
                </div>
            </div>
            <div class="product-card">
                <img src="images/product3.jpg" alt="Авто 3" class="product-img">
                <div class="product-info">
                    <h3 class="product-name">Audi A6 IV (C7), 2014</h3>
                    <p class="product-price">980.000 ₽</p>
                    <a href="https://t.me?text=Хочу_купить_Автомобиль" class="buy-btn">Заказать авто</a>
                </div>
            </div>
            <div class="product-card">
                <img src="images/product1.jpg" alt="Авто 4" class="product-img">
